name: Build Substack export

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/substack-export.yml"
      - "archetypes/**"
      - "content/posts/**"
      - "layouts/**"
      - "hugo.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.160.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup theme
        run: |
          if [ ! -d "themes/LoveIt" ] || [ ! "$(ls -A themes/LoveIt)" ]; then
            rm -rf themes/LoveIt
            git clone https://github.com/dillonzq/LoveIt.git themes/LoveIt
          fi
      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"
      - name: Create production config
        run: |
          mkdir -p config/production
          cat > config/production/params.toml << EOF
          contact_form_id = "${{ secrets.CONTACT_FORM_ID }}"
          
          [analytics]
            [analytics.google]
              id = "${{ secrets.GOOGLE_ANALYTICS_ID }}"
              respectDoNotTrack = false
            [analytics.clarity]
              id = "${{ secrets.MICROSOFT_CLARITY_ID }}"
          EOF
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://coreylweathers.com/"
      - name: Upload Substack export artifact
        uses: actions/upload-artifact@v4
        with:
          name: substack-export
          path: |
            public/posts/substack.json
            public/posts/**/substack.html
            public/posts/**/substack.json
          if-no-files-found: error
