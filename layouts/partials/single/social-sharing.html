{{- /* Social sharing and like buttons for blog posts */ -}}
<div class="post-social-sharing">
    <div class="sharing-buttons">
        <div class="sharing-label">Share this post:</div>
        <div class="sharing-actions">
            {{- $title := .Title | urlquery -}}
            {{- $url := .Permalink -}}
            
            <button class="share-btn share-twitter" 
                    title="Share on Twitter/X"
                    onclick="shareToTwitter(this)" data-url="{{ $url }}" data-title="{{ $title }}">
                <i class="fab fa-x-twitter" aria-hidden="true"></i>
                <span>X</span>
            </button>
            
            <button class="share-btn share-linkedin" 
                    title="Share on LinkedIn"
                    onclick="shareToLinkedIn(this)" data-url="{{ $url }}">
                <i class="fab fa-linkedin" aria-hidden="true"></i>
                <span>LinkedIn</span>
            </button>
            
            <button class="share-btn share-facebook" 
                    title="Share on Facebook"
                    onclick="shareToFacebook(this)" data-url="{{ $url }}">
                <i class="fab fa-facebook" aria-hidden="true"></i>
                <span>Facebook</span>
            </button>

            <button class="share-btn share-hn" 
                    title="Share on Hacker News"
                    onclick="shareToHN(this)" data-url="{{ $url }}" data-title="{{ $title }}">
                <i class="fab fa-y-combinator" aria-hidden="true"></i>
                <span>HN</span>
            </button>

            <button class="share-btn share-threads" 
                    title="Share on Threads"
                    onclick="shareToThreads(this)" data-url="{{ $url }}" data-title="{{ $title }}">
                <i class="fab fa-threads" aria-hidden="true"></i>
                <span>Threads</span>
            </button>

            <button class="share-btn share-bluesky" 
                    title="Share on Bluesky"
                    onclick="shareToBluesky(this)" data-url="{{ $url }}" data-title="{{ $title }}">
                <i class="fas fa-cloud" aria-hidden="true"></i>
                <span>Bluesky</span>
            </button>

            <button class="share-btn share-mastodon" 
                    title="Share on Mastodon"
                    onclick="shareToMastodon(this)" data-url="{{ $url }}" data-title="{{ $title }}">
                <i class="fab fa-mastodon" aria-hidden="true"></i>
                <span>Mastodon</span>
            </button>
            
            <button class="share-btn share-copy" 
                    onclick="copyToClipboard(this, '{{ $url | safeJS }}')" 
                    title="Copy link to clipboard">
                <i class="fas fa-link" aria-hidden="true"></i>
                <span>Copy</span>
            </button>

            <button class="share-btn share-like like-btn" 
                    id="like-btn" 
                    title="Like this post"
                    onclick="toggleLike(this)">
                <i class="fas fa-heart" aria-hidden="true"></i>
                <span id="like-count">0</span>
            </button>
        </div>
    </div>
</div>

<style>
.post-social-sharing {
    margin: 2rem 0;
    padding: 1.5rem;
    background: linear-gradient(135deg, #f5f1e8 0%, #faf8f5 100%);
    border-radius: 0.75rem;
    border: 1px solid #e7decf;
}

.sharing-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.sharing-actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
}

.share-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1rem;
    background: white;
    border: 1px solid #d4b277;
    border-radius: 0.5rem;
    color: #333;
    text-decoration: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s ease;
    font-family: inherit;
}

.share-btn:hover {
    background: #f0ede5;
    border-color: #8a5a00;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(138, 90, 0, 0.15);
}

.share-btn:active {
    transform: translateY(0);
    box-shadow: 0 2px 6px rgba(138, 90, 0, 0.1);
}

.share-btn.sharing {
    opacity: 0.7;
}

.share-btn i {
    font-size: 1rem;
}

.share-twitter { color: #1da1f2; }
.share-linkedin { color: #0a66c2; }
.share-facebook { color: #1877f2; }
.share-hn { color: #ff6600; }
.share-copy { color: #666; }

.like-btn {
    margin-left: auto;
    background: #fff5f0;
    border-color: #ff6b6b;
}

.like-btn i {
    color: #ff6b6b;
    transition: transform 0.2s ease;
}

.like-btn:hover {
    background: #ffe0e0;
    border-color: #cc5555;
}

.like-btn.liked i {
    color: #ff1744;
    transform: scale(1.2);
}

.like-btn.like-disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

@media (max-width: 640px) {
    .post-social-sharing {
        padding: 1rem;
    }
    
    .sharing-actions {
        gap: 0.5rem;
    }
    
    .share-btn {
        padding: 0.5rem 0.75rem;
        font-size: 0.8rem;
    }
    
    .share-btn span {
        display: none;
    }
    
    .share-btn i {
        font-size: 0.9rem;
    }
    
    .like-btn {
        margin-left: auto;
    }
}
</style>

<script>
function shareClick(btn, url) {
    btn.classList.add('sharing');
    setTimeout(() => {
        btn.classList.remove('sharing');
    }, 600);
    window.open(url, '_blank', 'noopener,noreferrer');
}

function shareToTwitter(btn) {
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}&via=coreylweathers`;
    shareClick(btn, shareUrl);
}

function shareToLinkedIn(btn) {
    const url = btn.dataset.url;
    const shareUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`;
    shareClick(btn, shareUrl);
}

function shareToFacebook(btn) {
    const url = btn.dataset.url;
    const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    shareClick(btn, shareUrl);
}

function shareToHN(btn) {
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    const shareUrl = `https://news.ycombinator.com/submitlink?u=${encodeURIComponent(url)}&t=${encodeURIComponent(title)}`;
    shareClick(btn, shareUrl);
}

function shareToThreads(btn) {
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    const text = `${decodeURIComponent(title)}\n\n${url}`;
    const shareUrl = `https://www.threads.net/intent/post?text=${encodeURIComponent(text)}`;
    shareClick(btn, shareUrl);
}

function shareToBluesky(btn) {
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    const text = `${decodeURIComponent(title)}\n\n${url}`;
    const shareUrl = `https://bsky.app/intent/compose?text=${encodeURIComponent(text)}`;
    shareClick(btn, shareUrl);
}

function shareToMastodon(btn) {
    const url = btn.dataset.url;
    const title = btn.dataset.title;
    const text = `${decodeURIComponent(title)}\n\n${url}`;
    // Mastodon uses a web intent pattern that works across instances
    const shareUrl = `https://mastodon.social/share?text=${encodeURIComponent(text)}`;
    shareClick(btn, shareUrl);
}

function setCopyButtonState(btn, text) {
    btn.innerHTML = text;
    setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-link" aria-hidden="true"></i><span>Copy</span>';
    }, 2000);
}

function fallbackCopyText(url) {
    const input = document.createElement('textarea');
    input.value = url;
    input.setAttribute('readonly', '');
    input.style.position = 'absolute';
    input.style.left = '-9999px';
    document.body.appendChild(input);
    input.select();
    const copied = document.execCommand('copy');
    document.body.removeChild(input);
    return copied;
}

function copyToClipboard(btn, url) {
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(url).then(() => {
            setCopyButtonState(btn, '✓ Copied!');
        }).catch(() => {
            if (fallbackCopyText(url)) {
                setCopyButtonState(btn, '✓ Copied!');
            }
        });
        return;
    }

    if (fallbackCopyText(url)) {
        setCopyButtonState(btn, '✓ Copied!');
    }
}

function getLikeKey() {
    return 'like_' + window.location.pathname;
}

function getLikeStorage() {
    try {
        const testKey = '__like_storage_test__';
        window.localStorage.setItem(testKey, '1');
        window.localStorage.removeItem(testKey);
        return window.localStorage;
    } catch (error) {
        return null;
    }
}

function getLikeCount() {
    const storage = getLikeStorage();
    if (!storage) {
        return 0;
    }

    const stored = storage.getItem(getLikeKey());
    return stored ? parseInt(stored) : 0;
}

function setLikeCount(count) {
    const storage = getLikeStorage();
    if (!storage) {
        return;
    }

    storage.setItem(getLikeKey(), Math.max(0, count));
}

function isLiked() {
    const storage = getLikeStorage();
    if (!storage) {
        return false;
    }

    return storage.getItem(getLikeKey() + '_user') === 'true';
}

function setLiked(liked) {
    const storage = getLikeStorage();
    if (!storage) {
        return;
    }

    storage.setItem(getLikeKey() + '_user', liked ? 'true' : 'false');
}

function updateLikeUI() {
    const btn = document.getElementById('like-btn');
    const count = document.getElementById('like-count');
    const storage = getLikeStorage();

    if (!btn || !count) {
        return;
    }

    if (!storage) {
        btn.disabled = true;
        btn.setAttribute('aria-disabled', 'true');
        btn.title = 'Likes are unavailable in this browser mode';
        count.textContent = '0';
        btn.classList.add('like-disabled');
        return;
    }

    const liked = isLiked();
    
    count.textContent = getLikeCount();
    if (liked) {
        btn.classList.add('liked');
    } else {
        btn.classList.remove('liked');
    }
}

 function toggleLike(btn) {
    if (btn.classList.contains('like-disabled')) {
        return;
    }

    const liked = isLiked();
    const currentCount = getLikeCount();
    
    if (liked) {
        setLikeCount(currentCount - 1);
        setLiked(false);
    } else {
        setLikeCount(currentCount + 1);
        setLiked(true);
    }
    
    updateLikeUI();
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', updateLikeUI);
</script>
