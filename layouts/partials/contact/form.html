<div class="contact-form-shell">
  <form class="contact-form" method="post" action="https://forms.un-static.com/forms/{{ .Site.Params.contact_form_id }}">
    <h2>Send me a message</h2>

    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" name="name" class="form-control" placeholder="Please enter your name" type="text" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" name="email" class="form-control" placeholder="Your email address" type="email" required>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" class="form-control" placeholder="Tell me about your project, event, or question..." required></textarea>
    </div>

    <button name="submit" type="submit" class="btn-submit">Send Message</button>

    <div class="form-footer">
      <small>Powered by <a href="https://un-static.com" rel="nofollow">Un-static Forms</a></small>
    </div>
  </form>
</div>
